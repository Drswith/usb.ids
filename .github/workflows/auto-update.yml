name: Auto Update USB.IDS

permissions:
  id-token: write
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: auto-update
  cancel-in-progress: false

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      update_mode:
        description: "auto (hash vs npm), force (always), dry-run (fetch+build only, no publish)"
        required: false
        default: auto
        type: choice
        options:
          - auto
          - force
          - dry-run

jobs:
  auto-update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install

      - name: Plan fetch and publish
        id: plan
        run: |
          set -e
          EVENT="${{ github.event_name }}"
          MODE="${{ github.event.inputs.update_mode }}"
          [ -z "$MODE" ] && MODE=auto
          IS_DRY=false
          if [ "$EVENT" = "workflow_dispatch" ] && [ "$MODE" = "dry-run" ]; then
            IS_DRY=true
          fi
          echo "is_dry_run=$IS_DRY" >> "$GITHUB_OUTPUT"

          run_fetch=false
          if [ "$EVENT" = "workflow_dispatch" ]; then
            case "$MODE" in
              force)
                run_fetch=true
                ;;
              dry-run|auto)
                if pnpm run diff-hash; then
                  echo "No update needed (hash vs npm latest)"
                  run_fetch=false
                else
                  run_fetch=true
                fi
                ;;
            esac
          else
            if pnpm run diff-hash; then
              run_fetch=false
            else
              run_fetch=true
            fi
          fi
          echo "run_fetch=$run_fetch" >> "$GITHUB_OUTPUT"

          run_publish=false
          if [ "$run_fetch" = "true" ] && [ "$IS_DRY" != "true" ]; then
            run_publish=true
          fi
          echo "run_publish=$run_publish" >> "$GITHUB_OUTPUT"

      - name: Fetch USB IDs
        if: steps.plan.outputs.run_fetch == 'true'
        run: pnpm run fetch-usb-ids

      - name: Full build (lib, data artefacts, UI)
        if: steps.plan.outputs.run_fetch == 'true'
        run: pnpm run build

      - name: Upload build artifacts
        if: steps.plan.outputs.run_fetch == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: usb-ids-build-${{ github.run_number }}
          path: |
            packages/cli/dist/
            packages/cli/usb.ids
            packages/cli/usb.ids.json
            packages/cli/usb.ids.version.json
          retention-days: 30

      - name: Update package versions for publish
        if: steps.plan.outputs.run_publish == 'true'
        run: |
          NEW_VERSION=$(node -p "const v=require('./packages/cli/usb.ids.version.json'); String(v.releaseVersion || v.version).replace(/^v/, '')")
          echo "New version: $NEW_VERSION"

          node -e "
            const fs = require('fs');
            const targets = [
              './packages/cli/package.json'
            ];
            for (const file of targets) {
              if (!fs.existsSync(file)) continue;
              const pkg = JSON.parse(fs.readFileSync(file, 'utf8'));
              pkg.version = '$NEW_VERSION';
              fs.writeFileSync(file, JSON.stringify(pkg, null, 2) + '\n');
            }
          "

          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          git add packages/cli/package.json packages/cli/usb.ids packages/cli/usb.ids.json packages/cli/usb.ids.version.json
          git commit -m "chore: update to version $NEW_VERSION

          - Automated data and CalVer bump"

      - name: Create and push tag
        if: steps.plan.outputs.run_publish == 'true'
        run: |
          TAG_VERSION=$(node -p "const v=require('./packages/cli/usb.ids.version.json'); String(v.releaseVersion || v.version).replace(/^v/, '')")
          echo "Creating tag: v$TAG_VERSION"
          git tag -a "v$TAG_VERSION" -m "Release v$TAG_VERSION"
          git push origin main
          git push origin "v$TAG_VERSION"

      - name: Generate changelog
        if: steps.plan.outputs.run_publish == 'true'
        run: pnpm dlx changelogithub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish CLI package to npm (trusted publishing via OIDC)
        if: steps.plan.outputs.run_publish == 'true'
        run: pnpm --filter "./packages/cli" publish --access public --provenance --no-git-checks

  notify-failure:
    runs-on: ubuntu-latest
    needs: [auto-update]
    if: ${{ always() && needs.auto-update.result == 'failure' }}
    permissions:
      issues: write
    steps:
      - name: Report failure as GitHub issue
        uses: actions/github-script@v7
        with:
          script: |
            const body = `**Auto Update USB.IDS** workflow failed.

            - Run: ${context.runId}
            - [Open workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[auto-update] failed (${new Date().toISOString().slice(0, 10)} #${context.runId})`,
              body,
            });
